  - decision: "Resolved Ambiguities (6 Definitive Resolutions)"
    value:
      - ambiguity_1_subchapter_f_quarantine:
          status: "RESOLVED"
          part_73_select_agents: "RELEVANT (Medium) — Applies to compounding pharmacies and regenerative medicine labs; FDA-approved botulinum toxin products (Botox/Dysport) explicitly exempt"
          part_70_quarantine: "RELEVANT (Low) — Reporting obligations for quarantinable diseases"
          part_75_radiologic_credentialing: "RELEVANT (Low) — X-ray and fluoroscopy personnel credentialing"
          part_71_foreign_quarantine: "IRRELEVANT"
          part_72_reserved: "IRRELEVANT"
      
      - ambiguity_2_subchapter_j_vaccines:
          status: "RESOLVED"
          part_100_vicp: "RELEVANT (Medium) — Vaccine-administering practices must: distribute VIS, maintain records, report adverse events to VAERS; Vaccine Injury Table defines presumed vaccine-caused injuries"
          part_110_cicp: "RELEVANT (Low) — Escalates to significant during declared public health emergencies"
      
      - ambiguity_3_chip_part_457:
          status: "RESOLVED as RELEVANT (Medium)"
          detail: "Subpart I (§§457.900–457.990) creates DIRECT provider screening, enrollment, and fraud/abuse compliance obligations paralleling Medicaid Part 455; Florida KidCare operationally relevant for pediatric practices"
      
      - ambiguity_4_qios_parts_475_481:
          status: "RESOLVED as RELEVANT (Low to Medium)"
          detail: "QIOs create direct obligations: mandatory record disclosure (§476.78), payment denial authority (§476.86), mandatory quality investigations (§§476.100–476.130), sanctions referral authority (§476.160)"
      
      - ambiguity_5_subchapter_h_part_512:
          status: "RESOLVED as RELEVANT (Medium-High to Pain Management)"
          detail: "Subpart G — Ambulatory Specialty Model (ASM): Mandatory January 1, 2027 launch; Pain Management practices mandatorily included in Low Back Pain cohort; 40% of CBSAs nationwide affected; ±9%+ payment adjustments applied to ALL Part B services; CMS signaled future expansion to other specialties"
      
      - ambiguity_6_pace_part_460:
          status: "CONFIRMED IRRELEVANT"
          detail: "Institutional elderly managed care program (55+); independent practices are not PACE organizations; no direct obligations"

  - decision: "Newly Codified Parts (December 2024 via 89 FR 98228)"
    value:
      - part_427_medicare_part_b_drug_inflation_rebate:
          status: "NEWLY ACTIVE (December 2024)"
          relevance_level: "Medium"
          affected_practice_types:
            - IV Therapy/Infusion
            - Peptide Therapy
            - HRT
            - Regenerative Medicine
            - Compounding Pharmacy
          detail: "Implements IRA §11101; Subpart C adjusts beneficiary coinsurance for Part B rebatable drugs exceeding inflation thresholds; directly affects buy-and-bill revenue cycle and patient collection amounts"
      
      - part_428_medicare_part_d_drug_inflation_rebate:
          status: "NEWLY ACTIVE (December 2024)"
          relevance_level: "Low"
          affected_practice_types:
            - Compounding Pharmacy
            - Primary Care
            - Weight Management
          detail: "Regulates manufacturers; indirect impact on formulary decisions and drug availability; lower direct relevance than Part 427"

  - decision: "Temporary Provisions Requiring Monitoring"
    value:
      - part_12_telemedicine_flexibilities:
          current_status: "ACTIVE (Fourth Extension)"
          expiration_date: "December 31, 2026"
          federal_register_citation: "90 FR 61306"
          detail: "Authorizes DEA-registered practitioners to prescribe Schedule II–V controlled substances via telemedicine without prior in-person evaluation; critical for telehealth, pain management, weight management (phentermine), HRT; permanent DEA rules under development"
          action_required: "HIGH PRIORITY MONITORING — Automatic expiration creates compliance cliff 12/31/2026"

  - decision: "Chapter II–III Confirmation"
    value:
      chapter_ii_status: "RESERVED — Confirmed empty on eCFR through 3/12/2026"
      chapter_iii_status: "RESERVED — Confirmed empty on eCFR through 3/12/2026"
      verification_sources:
        - eCFR current through 3/12/2026
        - Cornell Law Institute
      conclusion: "No active parts exist in Chapters II–III; no chapters beyond V exist in Title 42"

