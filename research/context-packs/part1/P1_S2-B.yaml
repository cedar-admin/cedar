        - part: 410
          title: "Supplementary Medical Insurance (SMI) Benefits — Part B Covered Services"
          relevant: true
          relevance_level: "CRITICAL"
          cedar_practice_types: ["All 14 types"]
          notes: "THE SINGLE MOST IMPORTANT PART for Cedar; defines which physician/NP/PA services Part B covers; key sections: §410.20 (physicians' services), §410.26 (incident-to — essential for NP/PA supervision models), §410.32 (diagnostic tests), §410.33 (IDTFs), §410.78 (telehealth — critical for Telehealth practices); Subpart G: Medical Nutrition Therapy (Weight Management, Functional Medicine); Subpart H: Diabetes self-management training"
        
        - part: 411
          title: "Exclusions from Medicare and Limitations on Medicare Payment"
          relevant: true
          relevance_level: "CRITICAL"
          cedar_practice_types: ["All 14 types"]
          notes: "Subpart A: general exclusions — defines what Medicare does NOT cover (cosmetic surgery, experimental procedures); critical boundary for Med Spa, Anti-Aging, Peptide Therapy, Regenerative Medicine; Subpart J: STARK LAW REGULATIONS (§§411.350–411.389) — physician self-referral prohibition; critical for any practice with referral relationships, lab ownership, imaging center interests"
        
        - part: 412
          title: "Prospective Payment for Inpatient Hospital Services (DRGs)"
          relevant: true
          relevance_level: "LOW"
          cedar_practice_types:
            - Pain Management
            - Primary Care
          notes: "Primarily institutional; understanding observation vs. inpatient status and DRG system relevant for care coordination only"
        
        - part: 413
          title: "Principles of Reasonable Cost Reimbursement"
          relevant: true
          relevance_level: "LOW"
          cedar_practice_types: ["Limited"]
          notes: "Primarily institutional (hospitals, SNFs, ESRD facilities); independent practices generally not cost-reporting entities"
        
        - part: 414
          title: "Payment for Part B Medical and Other Health Services"
          relevant: true
          relevance_level: "CRITICAL"
          cedar_practice_types: ["All 14 types"]
          notes: "Second most critical part for Cedar after Part 410; contains: Subpart B — Physician Fee Schedule (RVUs, geographic adjustments, conversion factors); Subpart G — Lab test fee schedule; Subpart I/K — Drug/biological payment (ASP+6% methodology, critical for buy-and-bill practices: IV Therapy, Peptide Therapy, HRT, Regenerative Medicine); Subpart O — MIPS (quality reporting, payment adjustments for virtually all eligible clinicians); Subpart P — Home infusion therapy payments; Subpart L — Supplying/dispensing fees (Compounding Pharmacy)"
        
        - part: 415
          title: "Services of Physicians in Providers/Teaching Settings"
          relevant: true
          relevance_level: "LOW"
          cedar_practice_types:
            - Primary Care
            - Pain Management
          notes: "Primarily institutional/academic; limited relevance for independent practices unless operating in provider-based or teaching settings"
        
        - part: 416
          title: "Ambulatory Surgical Services"
          relevant: true
          relevance_level: "MEDIUM"
          cedar_practice_types:
            - Med Spa/Aesthetic Medicine
            - Pain Management
            - Regenerative Medicine
