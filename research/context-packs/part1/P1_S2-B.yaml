  chapter_v_part_level_allowlist:
    title: "Office of Inspector General-Health Care (Parts 1000–1008)"
    total_active_parts: 9
    relevant_parts: 9
    note: "Every active part in Chapter V is relevant"
    critical_parts:
      - 1001
      - 1003
    high_parts:
      - 1002
      - 1004
      - 1005
      - 1007
      - 1008
    medium_parts:
      - 1000
      - 1006
    parts:
      - part: 1000
        title: "Introduction; General Definitions"
        relevant: true
        relevance_level: "MEDIUM"
        cedar_practice_types: ["All 14 types"]
        notes: "Foundational definitions for Chapter V; key: 'patient' definition is broader than practitioners assume — includes any individual receiving health care regardless of reimbursement source; 'professionally recognized standards' — when HHS declares a treatment modality not safe/effective, practitioners using it deemed non-compliant; directly relevant to practices offering novel therapies"
      
      - part: 1001
        title: "Program Integrity—Medicare and State Health Care Programs"
        relevant: true
        relevance_level: "CRITICAL"
        cedar_practice_types: ["All 14 types"]
        notes: "Core OIG exclusion authority; Mandatory exclusions (Subpart B): program-related crime, patient abuse, felony healthcare fraud, felony controlled substance conviction; Permissive exclusions (Subpart C): misdemeanor fraud, license revocation, kickback violations, student loan default; §1001.952: Anti-Kickback Safe Harbors — defines safe harbors for investment interests, space/equipment rental, personal services, management contracts, referral services, discounts, employees, group purchasing, coinsurance waivers, etc.; ALL practices must screen employees/contractors against OIG exclusion list (LEIE); practices with referral arrangements must understand safe harbors"
      
      - part: 1002
        title: "Program Integrity—State-Initiated Exclusions from Medicaid"
        relevant: true
        relevance_level: "HIGH"
        cedar_practice_types:
          - "All Medicaid-participating (esp. Primary Care, Pain Management, Compounding Pharmacy, Chiropractic)"
        notes: "State Medicaid agency exclusion authority; states must exclude OIG-excluded individuals; Florida's MFCU is particularly active; even practices not directly billing Medicaid can be affected if employing excluded individuals"
      
      - part: 1003
        title: "Civil Money Penalties, Assessments and Exclusions"
        relevant: true
        relevance_level: "CRITICAL"
        cedar_practice_types: ["All 14 types"]
        notes: "Financial enforcement teeth; CMPs for: false claims ($10K–$100K+ per violation), anti-kickback violations, Stark violations, beneficiary inducement, employing excluded individuals, failure to grant OIG audit access; assessments up to 3x amount claimed; key risk areas: Compounding Pharmacy (false claims for compounds), Med Spa (kickback arrangements, billing cosmetic as medical), Pain Management (unnecessary services), Telehealth (services not rendered), DPC/Concierge (beneficiary inducement issues)"
      
      - part: 1004
        title: "Imposition of Sanctions by QIO Recommendation"
        relevant: true
        relevance_level: "HIGH"
        cedar_practice_types:
          - "All Medicare-billing types (esp. Pain Management, Functional Medicine, Chiropractic, IV Therapy, Regenerative Medicine)"
        notes: "OIG sanctions based on QIO quality-of-care findings; QIOs can recommend exclusion for: services substantially in excess of needs, quality failing professionally recognized standards, or services not medically necessary; particularly relevant for practices whose approaches may differ from conventional standards"
      
      - part: 1005
        title: "Appeals of Exclusions, CMPs and Assessments"
        relevant: true
        relevance_level: "HIGH"
        cedar_practice_types: ["All 14 types"]
        notes: "Due process framework; ALJ hearings, DAB review, evidence procedures; 60-day deadline to request hearing after notice; every practice must understand appeal rights as a safeguard"
      
      - part: 1006
        title: "Investigational Inquiries"
        relevant: true
        relevance_level: "MEDIUM"
        cedar_practice_types:
          - "All 14 types (esp. Compounding Pharmacy, Pain Management, Med Spa, Telehealth)"
        notes: "OIG subpoena authority for documents and testimony; practices in high-fraud-risk areas should have response protocols"
      
      - part: 1007
        title: "State Medicaid Fraud Control Units"
        relevant: true
        relevance_level: "HIGH"
        cedar_practice_types:
          - "All Medicaid-participating (esp. Compounding Pharmacy, Pain Management, Primary Care)"
        notes: "MFCU certification, funding, authority; Florida's MFCU (within Attorney General's Office) is particularly aggressive; compounding pharmacy fraud and pain management 'pill mills' have been primary MFCU targets; MFCUs also investigate patient abuse/neglect"
      
      - part: 1008
        title: "Advisory Opinions by the OIG"
