          notes: "CMS contracts with MACs — administrative, no provider obligations"
        
        - part: 422
          title: "Medicare Advantage Program"
          relevant: true
          relevance_level: "HIGH"
          cedar_practice_types: ["All 14 types"]
          notes: "~50%+ of Medicare beneficiaries now in MA plans; Subpart E governs provider-plan relationships, contract terms, prompt payment, network adequacy; MA prior authorization and utilization management directly affect all Cedar practices seeing Medicare patients"
        
        - part: 423
