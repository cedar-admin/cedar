          notes: "ESSENTIAL; Subpart C: claims filing requirements; Subpart D: assignment rules; Subpart P: PROVIDER ENROLLMENT (CMS-855) — defines entire enrollment process, revalidation, revocation triggers, effective dates; without proper enrollment, a practice cannot bill Medicare at all"
        
