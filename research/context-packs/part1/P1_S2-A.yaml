  chapter_i_subchapter_j_radiological_health:
    title: "Chapter I, Subchapter J: Radiological Health (Parts 1000–1050)"
    session_1_resolution: |
      Subchapter J definitively RELEVANT. Part 1020 (X-ray standards) applies to chiropractic 
      and primary care; Part 1040 (laser standards) applies directly to med spas and aesthetic 
      practices. These are not optional — they are mandatory performance standards for devices 
      already in wide use