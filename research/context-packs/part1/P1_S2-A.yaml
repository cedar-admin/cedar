session_id: "P1_S2"
title: "Title 21 CFR Part-Level Allowlist for Cedar's Classification Pipeline"
summary: |
  Comprehensive part-level filtering for Title 21 (Food and Drugs) across FDA (Parts 1–1299) 
  and DEA (Parts 1300–1321) subchapters. Of ~300 active parts, 95 parts classified RELEVANT 
  or CONDITIONALLY RELEVANT to Cedar's 14 target practice types; remainder (food standards, 
  animal drugs, tobacco) excluded. Resolves Session 1 ambiguities (Subchapter G cosmetics, 
  Subchapter J radiological health) with definitive classifications structured for engineering 
  implementation.

key_decisions:
  - decision: "Subchapter A (General, Parts 1–99): 19 parts RELEVANT"
    value: [1, 2, 3, 4, 7, 10, 11, 16, 17, 50, 54, 56, 58, 70, 99]
    notes: "Parts 1, 7, 11, 50, 56 classified CRITICAL; Parts 2–4, 10, 54, 58, 70, 99 HIGH/MODERATE"
  
  - decision: "Subchapter B (Food, Parts 100–199): 5 parts RELEVANT"
    value: [101, 111, 119, 189, 190]
    notes: "Parts 111, 190 CRITICAL (supplement cGMP, NDI); Parts 101, 119, 189 MODERATE/LOW. Remaining 95 parts (food standards, additives, GRAS listings) IRRELEVANT."
  
  - decision: "Subchapter C (Drug General, Parts 200–299): 15 parts RELEVANT"
    value: [200, 201, 202, 203, 205, 206, 207, 208, 209, 210, 211, 216, 250, 251, 290, 299]
    notes: "Parts 201, 207, 210–211, 216 CRITICAL; Part 202–203, 290 HIGH. Part 206 LOW."
  
  - decision: "Subchapter D (Drugs for Human Use, Parts 300–499): 22 parts RELEVANT"
    value: [300, 310, 312, 314, 316, 320, 328, 329, 330, 333, 338, 340, 341, 343, 347, 348, 352, 357, 358, 361, 369]
    notes: "Parts 310, 312, 330, 343, 348 MODERATE; Part 352 STAYED indefinitely but listed; remaining LOW/CONDITIONAL."
  
  - decision: "Subchapter E (Animal Drugs, Parts 500–599): 0 parts RELEVANT"
    value: []
    notes: "ENTIRE SUBCHAPTER IRRELEVANT. Animal drug manufacturing, labeling, residues, medicated feeds have no application to human medical practices."
  
  - decision: "Subchapter F (Biologics, Parts 600–680): 9 parts RELEVANT"
    value: [600, 601, 606, 607, 610, 630, 640, 660, 680]
    notes: "All 9 parts CRITICAL or HIGH. Parts 600, 601, 606, 610, 630, 640 CRITICAL for regenerative medicine, IV therapy, blood products."
  
  - decision: "Subchapter G (Cosmetics, Parts 700–799): 6 parts RELEVANT + reserved monitoring"
    value: [700, 701, 710, 720, 740]
    reserved_monitoring: [741, 799]
    notes: "Parts 700–701, 740 CRITICAL for Med Spa compliance under MoCRA (effective Dec 2024). Parts 710, 720 superseded by MoCRA but retained in CFR. Parts 741–799 RESERVED; monitor Federal Register for cosmetic GMP, fragrance allergen, talc/asbestos testing rules (~2025–2026)."
    session_1_resolution: "Subchapter G definitively RELEVANT. MoCRA imposed mandatory facility registration, product listing, serious adverse event reporting (15-day window), safety substantiation. Med spas routinely use/sell/private-label cosmetics."
  
  - decision: "Subchapter H (Medical Devices, Parts 800–898): 25 parts RELEVANT"
    value: [800, 801, 803, 806, 807, 809, 810, 812, 814, 820, 821, 822, 830, 860, 862, 864, 866, 868, 870, 876, 878, 880, 882, 888, 890, 892, 895, 898]
    notes: "Parts 803, 807, 812, 814, 820, 878, 880, 882, 890 CRITICAL. Parts 868, 870, 864, 892 HIGH. Excludes Parts 872 (dental), 874 (ENT), 884 (OB/GYN), 886 (ophthalmology)."
  
  - decision: "Subchapter I (Mammography, Part 900): 0 parts RELEVANT"
    value: []
    notes: "CONFIRMED IRRELEVANT. MQSA accreditation for mammography facilities. None of Cedar's 14 practice types perform mammography."
  
  - decision: "Subchapter J (Radiological Health, Parts 1000–1050): 7 parts RELEVANT"
    value: [1000, 1002, 1005, 1010, 1020, 1040, 1050]
    notes: "Parts 1020, 1040 CRITICAL. Part 1020 (X-ray standards) applies to chiropractic, primary care, pain management with imaging. Part 1040 (laser standards) applies to med spas with aesthetic lasers. Parts 1000, 1010 MODERATE framework parts."
    session_1_resolution: "Subchapter J definitively RELEVANT. Part 1020 (diagnostic X-ray) and Part 1040 (lasers ≥Class III) are mandatory performance standards for devices in wide use by Cedar practices."
  
  - decision: "Subchapter K (Tobacco Products, Parts 1100–1150): 0 parts RELEVANT"
    value: []
    notes: "CONFIRMED IRRELEVANT. 8 parts (1100, 1105, 1107, 1114, 1140, 1141, 1143, 1150). None of Cedar's practices manufacture, distribute, retail tobacco."
  
  - decision: "Subchapter L (Other Acts, Parts 1210–1299): 2 parts RELEVANT"
    value: [1240, 1271]
    notes: "Part 1271 (HCT/Ps) CRITICAL — governs stem cells, amniotic tissue, exosomes, cord products, PRP. Part 1240 (communicable diseases) LOW but provides FDA authority. Part 1270 REVOKED — consolidated into 1271. All other parts irrelevant."
  
  - decision: "Chapter II DEA (Parts 1300–1321): 11 parts RELEVANT"
    value: [1300, 1301, 1302, 1304, 1305, 1306, 1307, 1308, 1311, 1314, 1317]
    notes: "Parts 1300–1308, 1311, 1317 CRITICAL for all prescribing practices. Part 1306 (prescriptions), 1308 (schedules), 1301 (registration), 1311 (EPCS) highest priority. Parts 1314 (pseudoephedrine), 1317 (disposal) HIGH."
  
  - decision: "Chapter III ONDCP (Parts 1400–1499): 0 parts RELEVANT"
    value: []
    notes: "CONFIRMED IRRELEVANT. Administrative housekeeping only (FOIA, declassification). No regulatory impact on medical practices."

