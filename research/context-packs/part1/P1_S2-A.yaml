  chapter_i_subchapter_g_cosmetics:
    title: "Chapter I, Subchapter G: Cosmetics (Parts 700–799)"
    session_1_resolution: |
      Subchapter G definitively RELEVANT. MoCRA (Modernization of Cosmetics Regulation Act, 
      enacted Dec 2022) imposed mandatory facility registration, product listing, serious adverse 
      event reporting (15-day window), safety substantiation, and upcoming GMP requirements. 
      Med spas routinely use, sell, and private-label cosmetic products. The cosmetic-vs-drug 
      distinction is fundamental to aesthetic practice compliance.
    relevant_parts:
      part_700:
        description: "General"
        relevant: true
        relevance_level: HIGH
        practice_types: [MS]
        regulatory_content:
          - "Prohibited cosmetic ingredients (§700.11)"
          - "Mercury, vinyl chloride, chloroform, methylene chloride, cattle-derived materials"
          - "CRITICAL for practices private-labeling or compounding topicals"
          - "Defines cosmetic product scope and FDA authority"
      
      part_701:
        description: "Cosmetic Labeling"
        relevant: true
        relevance_level: HIGH
        practice_types: [MS]
        regulatory_content:
          - "Labeling requirements for cosmetic products (§701.1–§701.4)"
          - "MoCRA added contact-info requirements (effective Dec 2024)"
          - "Name/address of responsible person on label"
          - "Applies to products sold/distributed by med spas"
      
      part_710:
        description: "Voluntary Registration of Cosmetic Establishments"
        relevant: true
        relevance_level: MODERATE
        practice_types: [MS]
        regulatory_content:
          - "SUPERSEDED BY MoCRA mandatory facility registration (enforced July 1, 2024)"
          - "Part remains in CFR but inactive"
          - "MoCRA mandatory registration is the current requirement"
      
      part_720:
        description: "Voluntary Filing of Cosmetic Product Ingredient Statements"
        relevant: true
        relevance_level: MODERATE
        practice_types: [MS]
        regulatory_content:
          - "SUPERSEDED BY MoCRA mandatory product listing"
          - "Same status as Part 710 — replaced by statutory requirements"
      
      part_740:
        description: "Cosmetic Product Warning Statements"
        relevant: true
        relevance_level: HIGH
        practice_types: [MS]
        regulatory_content:
          - "Warning requirements for cosmetic products"
          - "Pressurized containers, coal tar dyes, feminine deodorant sprays"
          - "Applicable to products used/sold by practices"
      
    reserved_monitoring:
      parts_741_799:
        description: "[Reserved]"
        monitoring_rationale: "MoCRA rulemaking for cosmetic GMPs, fragrance allergen disclosure, asbestos/talc testing expected to populate these parts (~2025–2026). Cedar should monitor Federal Register for proposed rules in these part numbers."

