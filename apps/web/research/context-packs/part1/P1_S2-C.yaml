        - "Part 80 (Nondiscrimination — Title VI)"
        - "Part 84 (Nondiscrimination — Section 504)"
        - "Part 144 (Health Insurance Coverage Requirements)"
        - "Part 146 (Group Health Insurance Market Requirements)"
        - "Part 147 (ACA Market Reforms)"
        - "Part 180 (Hospital Price Transparency)"
        - "Part 184 (PBM Transparency Standards)"
