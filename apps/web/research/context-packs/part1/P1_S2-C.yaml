session_id: "P1_S2-C"
title: "Part-Level Allowlists for CFR Titles 45, 29, 26, and 16"
summary: |
  Comprehensive part-level mapping for four major CFR titles with all AMBIGUOUS 
  classifications resolved and false negatives minimized. Title 45 yields 20 relevant 
  parts anchored by HIPAA and No Surprises Act. Title 29 produces ~45 relevant parts 
  spanning wage/hour, OSHA, EEOC, and ERISA. Title 26 identifies 4 relevant parts with 
  healthcare-specific section ranges. Title 16 contributes ~33 relevant parts led by FTC 
  advertising, data security, and consumer protection rules.

key_decisions:
