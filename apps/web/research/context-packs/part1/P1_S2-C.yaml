        - "Part 149 (Surprise Billing / No Surprises Act)"
        - "Part 160 (HIPAA General Administrative Requirements)"
        - "Part 162 (HIPAA Transactions/NPI)"
        - "Part 164 (HIPAA Security and Privacy)"
      high:
        - "Part 170 (Health IT Standards and Certification)"
      moderate:
