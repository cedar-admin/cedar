    | XIV | — | 1608 | Affirmative Action | YES | LOW | All 14 practice types | Defines permissible voluntary affirmative action. Most small practices don't maintain formal plans. |
    | XIV | — | 1610–1615 | EEOC FOIA, Privacy Act, Sunshine Act, Federal Sector EEO, EEOC Section 504 | NO | IRRELEVANT | — | EEOC internal or federal-agency-only rules. |
    | XIV | — | 1620 | Equal Pay Act | YES | HIGH | All 14 practice types | EQUAL PAY FOR EQUAL WORK regardless of sex. Critical where pay disparities exist between male/female providers doing same clinical work. |
    | XIV | — | 1621 | Equal Pay Act Procedures | YES | MODERATE | All 14 practice types | Procedural rules for EPA enforcement. Companion to Part 1620. |
    | XIV | — | 1625 | Age Discrimination (ADEA) | YES | HIGH | All 14 practice types | Prohibits age discrimination against employees 40+. Governs mandatory retirement, benefit provisions, waivers. |
    | XIV | — | 1626–1627 | ADEA Procedures and Recordkeeping | YES | HIGH | All 14 practice types | ADEA enforcement procedures and recordkeeping (payroll 3 years, personnel records 1 year for employers with 20+ employees). |
    | XIV | — | 1630 | ADA Regulations | YES | CRITICAL | All 14 practice types | THE MOST CRITICAL EEOC REGULATION FOR MEDICAL PRACTICES. Defines disability, reasonable accommodation, undue hardship, essential functions. Governs medical inquiry restrictions and fitness-for-duty evaluations. Applies to 15+ employees. |
    | XIV | — | 1635 | GINA | YES | CRITICAL (for noted types) | Functional Medicine, Hormone Optimization/HRT, Regenerative Medicine, Anti-Aging, Integrative Medicine, Primary Care, Peptide Therapy (CRITICAL); all others (MODERATE) | PROHIBITS USE OF GENETIC INFORMATION IN EMPLOYMENT. Especially critical for practices offering genetic testing — must ensure employee genetic information is not acquired or used in employment decisions. |
    | XIV | — | 1636 | Pregnant Workers Fairness Act (PWFA) | YES | CRITICAL | All 14 practice types | NEWEST MAJOR EEOC REGULATION (effective June 2024). Requires accommodation for pregnancy/childbirth-related limitations. Critical for practices with predominantly female clinical staff. |
    | XIV | — | 1640–1641 | ADA/Section 504 Coordination; Government Contractor ADA | YES | LOW | All 14 practice types | Interagency coordination. Background reference only. |
    | XIV | — | 1650, 1690, 1695 | EEOC debt collection, interagency coordination, guidance procedures | NO | IRRELEVANT | — | EEOC internal operations. |
    | XIV | — | 1691 | Complaints Against Federal Financial Assistance Recipients | YES | LOW | All 14 (if receiving federal funds) | Employment discrimination against entities receiving Medicare/Medicaid/grants. Low frequency but real risk. |

