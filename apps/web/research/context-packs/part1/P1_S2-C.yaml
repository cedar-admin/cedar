  regulatory_status_updates_march_2026: |
    Part 910 (FTC Non-Compete Rule):
      Status: REMOVED from CFR effective February 12, 2026
      Background: Courts vacated; FTC acceded to vacatur September 5, 2025
      Ongoing Enforcement: FTC may pursue case-by-case under Section 5 UMC
      
    Part 425 (Negative Option / Click-to-Cancel):
      Status: 2024 expanded amendments VACATED by 8th Circuit (July 2025)
      Current Text: Reverted to original 1973 text as of February 12, 2026
      Rulemaking: New ANPRM published March 13, 2026
      Relevance: Still HIGH for subscription-model practices until revised rule finalized
      
    Part 465 (Consumer Reviews and Testimonials Rule):
      Effective Date: October 21, 2024
      FTC Enforcement: Active as of December 2025 — warning letters being sent
      Relevance: CRITICAL for all practices managing online reputation
      
    26 CFR §48.4191 (Medical Device Excise Tax):
      Status: REPEALED December 20, 2019 (Pub.L. 116-94)
      Applicability: NO LONGER A COMPLIANCE CONCERN
      
    29 CFR 1636 (Pregnant Workers Fairness Act):
      Effective Date: June 27, 2024
      Relevance: CRITICAL for all 14 practice types with female clinical staff
      Requirement: Accommodate pregnancy/childbirth-related limitations unless undue hardship
      
    16 CFR 318 (Health Breach Notification Rule):
      Amendment Date: 2024
      Scope Expansion: Now covers health apps, wearables, and non-HIPAA health data
      Trigger: Unauthorized data sharing = breach
      Impact: Critical for practices using consumer-grade health tech

