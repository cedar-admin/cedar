data_structures:
  title_45_part_level_table: |
    | Chapter | Subchapter | Part | Part Description | Relevant? | Relevance Level | Cedar Practice Types Affected | Notes |
    |---------|------------|------|-----------------|-----------|-----------------|-------------------------------|-------|
    | I (HHS) | A | 1–45 | General HHS Administration | NO | IRRELEVANT | — | ~25 parts covering HHS internal operations. No provider compliance obligations. |
    | I (HHS) | A | 46 | Protection of Human Subjects (Common Rule) | YES | MODERATE | Regenerative Medicine, Peptide Therapy, Functional Medicine, Anti-Aging, Integrative Medicine | IRB requirements for human subjects research. Relevant for practices conducting clinical research or using investigational protocols. |
    | I (HHS) | A | 50–51 | Exchange Visitor Program / Alien Physician Reduction | NO | IRRELEVANT | — | Immigration/visa waivers, not provider regulation. |
    | I (HHS) | A | 60 | National Practitioner Data Bank (NPDB) | YES | HIGH | All 14 practice types | Malpractice payment reporting, adverse action queries, credentialing. All medical practices interact with NPDB. |
    | I (HHS) | A | 63–79 | HHS grant programs, conduct standards, remedial actions, fraud | NO | IRRELEVANT | — | HHS internal administration and grant management. |
    | I (HHS) | A | 80 | Nondiscrimination — Title VI (Civil Rights Act 1964) | YES | MODERATE | All 14 (if receiving federal funds) | Race/color/national origin nondiscrimination. Applies to practices receiving Medicare/Medicaid. |
    | I (HHS) | A | 81 | Hearing Procedures for Part 80 | NO | IRRELEVANT | — | Procedural rules only triggered by enforcement action. |
    | I (HHS) | A | 83 | PHS Act Nondiscrimination (Educational Institutions) | NO | IRRELEVANT | — | Applies to educational institutions, not practices. |
    | I (HHS) | A | 84 | Nondiscrimination — Section 504 (Disability) | YES | MODERATE | All 14 (if receiving federal funds) | Disability accessibility for entities receiving federal financial assistance. |
    | I (HHS) | A | 85–87 | HHS-conducted programs nondiscrimination, Title IX, faith-based organizations | NO | IRRELEVANT | — | HHS-internal, educational, or faith-based org rules. |
    | I (HHS) | A | 88 | Conscience Protections for Healthcare Providers | YES | LOW | All 14 (if receiving federal funds) | Protects providers with religious/moral objections to certain procedures. |
    | I (HHS) | A | 89–91 | Leadership Act integrity, age nondiscrimination | NO | IRRELEVANT | — | International programs and general age discrimination (rarely implicated). |
    | I (HHS) | A | 92 | Nondiscrimination — Section 1557 of the ACA | YES | CRITICAL | All 14 practice types | PRIMARY federal civil rights law in healthcare. Prohibits discrimination on race, color, national origin, sex (including sexual orientation/gender identity), age, and disability. Applies to ANY practice receiving Medicare, Medicaid, or ACA marketplace payments. Requires nondiscrimination notices and language access services. |
    | I (HHS) | A | 93–101 | Lobbying restrictions, contractor conflicts, state/block grants, etc. | NO | IRRELEVANT | — | Government grant administration and emergency resource allocation. |
    | I (HHS) | A | 102 | Civil Monetary Penalty Inflation Adjustments | YES | LOW | All 14 practice types | Sets inflation-adjusted penalty amounts for HIPAA and other HHS violations. Useful for understanding penalty exposure. |
    | I (HHS) | B | 140–143 | [Reserved] | NO | IRRELEVANT | — | — |
    | I (HHS) | B | 144 | Requirements Relating to Health Insurance Coverage | YES | MODERATE | All 14 practice types | Definitions and scope for HIPAA portability (Parts 146–150). Relevant for practices offering or interacting with group health plans. |
    | I (HHS) | B | 146 | Group Health Insurance Market Requirements | YES | MODERATE | All 14 practice types | HIPAA portability for group health insurance. Relevant for practices as employers and for understanding patient insurance. |
    | I (HHS) | B | 147 | Health Insurance Reform — Group and Individual Markets | YES | MODERATE | All 14 practice types | ACA market reforms: preventive services, dependent coverage to age 26, no lifetime/annual limits, essential health benefits. |
    | I (HHS) | B | 148 | Individual Health Insurance Market Requirements | YES | LOW | All 14 practice types | Individual market rules. Less direct but affects patient coverage landscape. |
    | I (HHS) | B | 149 | Surprise Billing and Transparency (No Surprises Act) | YES | CRITICAL | All 14 practice types | PROHIBITS surprise billing for emergency services and out-of-network services at in-network facilities. Requires good faith cost estimates. Establishes IDR for payment disputes. Critical for all practices with out-of-network patients. |
    | I (HHS) | B | 150 | CMS Enforcement — Group and Individual Markets | YES | LOW | All 14 practice types | Enforcement mechanisms for Parts 146–149. Relevant for understanding compliance consequences. |
    | I (HHS) | B | 152–159 | Pre-existing condition plan, reinsurance, rate review, Exchange/QHP/SHOP/MLR/web portal | NO | IRRELEVANT | — | Insurance issuer and marketplace operations — not provider regulations. |
    | I (HHS) | C | 160 | HIPAA General Administrative Requirements | YES | CRITICAL | All 14 practice types | Defines covered entities, business associates, enforcement procedures, civil monetary penalties. Foundation for all HIPAA compliance. |
    | I (HHS) | C | 162 | HIPAA Administrative Requirements (Transactions/NPI) | YES | CRITICAL | All 14 practice types | Standard transaction code sets (EDI), NPI, employer ID, operating rules for electronic claims, eligibility, referrals, remittance. |
    | I (HHS) | C | 164 | HIPAA Security and Privacy | YES | CRITICAL | All 14 practice types | Privacy Rule (Subpart E), Security Rule (Subpart C), Breach Notification Rule (Subpart D). THE SINGLE MOST IMPORTANT REGULATION for all healthcare practices. Governs PHI use/disclosure, patient rights, safeguards for ePHI, breach notification. |
    | I (HHS) | D | 170 | Health IT Standards and Certification | YES | HIGH | All 14 practice types | ONC certified EHR requirements, interoperability standards (FHIR APIs, C-CDA), clinical quality measures. Impacts EHR selection and patient data access. |
    | I (HHS) | D | 171 | Information Blocking | YES | CRITICAL | All 14 practice types | Defines information blocking and exceptions. Providers face disincentives for blocking access to electronic health information. All practices using EHRs must understand prohibitions and exceptions. |
    | I (HHS) | E | 180 | Hospital Price Transparency | YES | MODERATE | Primary Care (DPC/Concierge), IV Therapy, Pain Management | Requires hospitals to publish standard charges. Most independent practices are not hospitals, but hospital-based outpatient departments may be affected. |
    | I (HHS) | E | 182 | COVID-19 Test Price Transparency | YES | LOW | Primary Care (DPC/Concierge) | Requires providers of COVID-19 tests to publish cash prices. Limited ongoing relevance. |
    | I (HHS) | E | 184 | PBM Transparency Standards | YES | MODERATE | Compounding Pharmacy, Weight Management, Peptide Therapy, Hormone Optimization/HRT | Targets pharmacy benefit manager transparency. Relevant for practices dealing with PBMs for specialty medications. Still in implementation — monitor. |
    | I (HHS) | — | Subtitle B (Chapters II–XXV) | TANF, child support, refugee resettlement, NSF, civil rights commission, OPM, community services, arts/humanities, AmeriCorps, legal services, various commissions | NO | IRRELEVANT | — | Confirmed irrelevant. 15+ chapters covering welfare programs and non-healthcare government agencies. |

  title_29_chapter_v_wage_hour_table: |
    | Chapter | Subchapter | Part | Description | Relevant? | Relevance Level | Cedar Practice Types Affected | Notes |
    |---------|------------|------|-------------|-----------|-----------------|-------------------------------|-------|
    | V | A | 500–502 | Migrant/Agricultural Worker Protection | NO | IRRELEVANT | — | Agriculture-specific. |
    | V | A | 504 | Nonimmigrant Nurses (H-1C) | YES | MODERATE | Primary Care, Pain Management, IV Therapy, Integrative Medicine | Healthcare-specific: attestations for facilities using foreign-trained RNs. |
    | V | A | 507 | H-1B Visa Employer Requirements | YES | MODERATE | All 14 practice types | Labor condition applications for H-1B specialty occupations. Relevant for sponsoring foreign-trained physicians, NPs, specialists. |
    | V | A | 516 | FLSA Recordkeeping | YES | CRITICAL | All 14 practice types | Every practice must maintain payroll records (hours, wages, deductions, overtime). 3-year retention for payroll, 2 years for time cards. |
    | V | A | 531 | Wage Payments Under FLSA | YES | HIGH | All 14 practice types | How wages are computed — tip credits, board/lodging deductions. Affects deductions from employee wages. |
    | V | A | 541 | Exempt Employee Definitions (Executive/Administrative/Professional) | YES | CRITICAL | All 14 practice types | THE #1 WAGE/HOUR COMPLIANCE ISSUE. Determines whether NPs, PAs, office managers, billing specialists are exempt from overtime. "Learned professional" exemption governs licensed healthcare providers. Salary threshold requirements affect all practices. |
    | V | A | 547–549 | Thrift/Savings Plans, Overtime Computation, Profit-Sharing Plans | YES | LOW | All 14 practice types | Alternative overtime computation methods and excludable plan definitions. |
    | V | A | 570 | Child Labor Regulations | YES | LOW | All 14 practice types | Minimum age/hour restrictions for minor employees. Relevant if employing 16–17 year olds. |
    | V | A | 578 | Wage/Overtime Civil Money Penalties | YES | MODERATE | All 14 practice types | Penalty amounts for FLSA violations. Important for understanding enforcement exposure. |
    | V | B | 776 | FLSA General Coverage | YES | MODERATE | All 14 practice types | Defines enterprise vs. individual coverage. Most practices meet the $500K enterprise threshold. |
    | V | B | 778 | Overtime Compensation | YES | HIGH | All 14 practice types | Comprehensive overtime computation — regular rate, bonuses, commissions, on-call pay, shift differentials. Critical for productivity-based compensation. |
    | V | B | 785 | Hours Worked | YES | CRITICAL | All 14 practice types | DEFINES COMPENSABLE "HOURS WORKED" — on-call time, rest/meal periods, training, travel, pre/post-shift activities. Critical for practices where staff are on-call or chart after hours. |
    | V | B | 790 | Portal-to-Portal Act | YES | MODERATE | All 14 practice types | Compensable vs. non-compensable pre/post-shift activities. Relevant for staff donning PPE or booting systems. |
    | V | B | 795 | Employee vs. Independent Contractor Classification | YES | CRITICAL | All 14, esp. Telehealth, Med Spa, Functional Medicine, Hormone Optimization, Pain Management | DEFINES THE FLSA TEST FOR EMPLOYEE VS. IC. EXTREMELY CRITICAL — Medical practices heavily use 1099 providers. Misclassification is a TOP COMPLIANCE RISK. |
    | V | C | 801 | Employee Polygraph Protection Act | YES | LOW | All 14, esp. Compounding Pharmacy | Prohibits most polygraph use. Exception for pharmaceutical theft investigations. |
    | V | C | 825 | FMLA | YES | CRITICAL | All 14 practice types (50+ employees) | 12 WEEKS UNPAID LEAVE for serious health conditions, childbirth, military family needs. Applies to employers with 50+ employees within 75 miles. Intersects with ADA for medical leave. |
    | V | C | 826 | FFCRA Paid Leave | YES | LOW | All 14 practice types | COVID-era emergency paid leave. Mandatory provisions expired 12/31/2020. Regulations remain for historical claims only. |
    | V | D | 870 | Garnishment Restrictions | YES | MODERATE | All 14 practice types | Limits employee earnings garnishment to 25% of disposable earnings. All practices processing payroll must comply when receiving garnishment orders. |

